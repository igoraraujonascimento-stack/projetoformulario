<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h3>Cadastre seu veículo para vender mais rápido</h3>
        </header>
        <div class="form-container">
            <div class="form-header">
                <p>Formulário</p>
            </div>
        </div>
        <div class="form-body">
            <h1 class="titulo-form">Venda fácil seu carro</h1>
            <p>Descreva as características do seu carro e marque os opcionais que ele possui.</p>
            <form>
                <div class="caixaInputs">
                    <label for="title">Título do anúncio <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="title" id="title" class="block" placeholder="Digite um título para o anúncio">
                </div>
                <div class="caixaInputs">
                    <label for="preco">Preço <span class="campo-obrigatorio">*</span></label>
                    <input type="number" name="preco" id="preco" class="block" placeholder="Digite o preço">
                </div>
                <div class="caixaInputs">
                    <label for="descricao">Descrição <span class="campo-obrigatorio">*</span></label>
                    <textarea name="descricao" id="descricao" class="block" placeholder="Digite a descrição de seu veículo"></textarea>
                </div>
                <div class="caixaInputs">
                    <label for="marca">Marca <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="marca" id="marca" class="block" placeholder="Digite a marca">
                </div>
                <div class="caixaInputs">
                    <label for="modelo">Modelo <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="modelo" id="modelo" class="block" placeholder="Digite o modelo">
                </div>
                <div class="caixaInputs">
                    <label for="kilometragem">Kilometragem <span class="campo-obrigatorio">*</span></label>
                    <input type="number" name="kilometragem" id="kilometragem" class="block" placeholder="Digite a kilometragem">
                </div>
                <div class="caixaInputs">
                    <label for="data-compra">Data de compra<span class="campo-obrigatorio">*</span></label>
                    <input type="date" name="data-compra" id="data-compra" class="block" >
                </div>
                <div class="caixaInputs">
                    <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                    <input type="radio" name="marcha" id="manual">
                    <label for="manual">Manual</label>
                </div>
                <label for="auto">Automático</label>
            </div>
            <div class="caixaOpcional">
                <p>Opcionais</p>
                <ul class="listaOpcionais">
                    <li>
                        <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                        <label for="airbag">Airbag</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                        <label for="alarme">Alarme</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcional[]" id="ar_condicionado" value="ar_condicionado">
                        <label for="ar_condicionado">Ar condicionado</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcional[]" id="camera_de_re" value="camera_de_re">
                        <label for="camera_de_re">Câmera de ré</label>
                    </li>
                </ul>
            </div>
            <div class="caixaOpcional">
                <ul class="listaOpcionais">
                    <li>
                        <input type="checkbox" name="opcional[]" id="assistencia_de_pista" value="assistencia_de_pista">
                        <label for="assistencia_de_pista">Assistência de pista</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcional[]" id="partida_sem_chave" value="partida_sem_chave">
                        <label for="partida_sem_chave">Partida sem chave</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcional[]" id="integracao_com_celular" value="integracao_com_celular">
                        <label for="integracao_com_celular">Integração com celular</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcional[]" id="banco_de_couro" value="banco_de_couro">
                        <label for="banco_de_couro">Banco de Couro</label>
                    </li>
                </ul>
            </div>
            </form>
        </div>
    </div>
</body>
</html>
